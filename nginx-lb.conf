events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream llm_backend {
        zone llm_backend 64k;
        least_conn;
        server test-server-1:8000 resolve;
        server test-server-2:8000 resolve;
    }

    server {
        listen 8080;
        server_name _;
        access_log /var/log/nginx/lb_access.log;
        error_log /var/log/nginx/lb_error.log;
        location / {
            proxy_pass http://llm_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_connect_timeout 60;
        }

        location /health {
            return 200 "Load Balancer OK";
            add_header Content-Type text/plain;
        }
        location /stats {
            default_type text/html;
            return 200 '<html><body><h1>Load Balancer Stats</h1><p>Backends: test-server-1:8000, test-server-2:8000</p></body></html>';
        }
    }
}
