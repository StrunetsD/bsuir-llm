apiVersion: 1
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Postgres
    orgId: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    editable: false

  - name: Postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: openwebui
    user: openwebui
    sslmode: disable
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
    secureJsonData:
      password: openwebui
