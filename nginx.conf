events {
    worker_connections 1024;
}

http {
    # OpenWebUI backend
    upstream openwebui_backend {
        server openwebui:8080;
    }

    # Ollama replicas with load balancing (round-robin by default)
    upstream ollama_backend {
        least_conn;
        server model-replica-1:11434;
        server model-replica-2:11434;
    }

    server {
        listen 80;
        server_name localhost;

        # OpenWebUI web interface
        location / {
            proxy_pass http://openwebui_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Load balanced API endpoint for models (Ollama replicas)
        location /v1/ {
            proxy_pass http://ollama_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}