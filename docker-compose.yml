services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    volumes:
      - ./data:/app/backend/data
      - ./branding/bsuir-logo.png:/app/build/static/logo.png:ro
      - ./branding/bsuir-logo.png:/app/backend/open_webui/static/logo.png:ro
      - ./branding/bsuir-logo.png:/app/build/static/favicon.png:ro
      - ./branding/bsuir-logo.png:/app/backend/open_webui/static/favicon.png:ro
      - ./branding/bsuir-logo.png:/app/build/static/favicon-dark.png:ro
      - ./branding/bsuir-logo.png:/app/backend/open_webui/static/favicon-dark.png:ro
      - ./branding/bsuir-logo.png:/app/build/static/splash.png:ro
      - ./branding/bsuir-logo.png:/app/backend/open_webui/static/splash.png:ro
      - ./branding/bsuir-logo.png:/app/build/static/splash-dark.png:ro
      - ./branding/bsuir-logo.png:/app/backend/open_webui/static/splash-dark.png:ro
      - ./branding/bsuir-logo.png:/app/build/static/apple-touch-icon.png:ro
      - ./branding/bsuir-logo.png:/app/backend/open_webui/static/apple-touch-icon.png:ro
      - ./branding/bsuir-logo.svg:/app/build/static/favicon.svg:ro
      - ./branding/bsuir-logo.svg:/app/backend/open_webui/static/favicon.svg:ro
    environment:
      ENABLE_WEB_LOADER_SSL_VERIFICATION: 'false'
      AIOHTTP_CLIENT_SESSION_TOOL_SERVER_SSL: 'false'
      AIOHTTP_CLIENT_SESSION_SSL: 'false'
      AIOHTTP_CLIENT_TIMEOUT_MODEL_LIST: '180'
      AIOHTTP_CLIENT_TIMEOUT: '3600'
      DEFAULT_MODELS: ${OPENWEBUI_DEFAULT_MODEL}
      ENV: 'dev'
      OFFLINE_MODE: 'true'
      SAFE_MODE: 'false'
      UVICORN_WORKERS: '1'
      DEFAULT_LOCALE: 'ru-RU'
      ENABLE_WEBSOCKET_SUPPORT: 'true'
      REDIS_ENABLED: 'false'
      ENABLE_USER_WEBHOOKS: 'false'
      WEBUI_NAME: ${OPENWEBUI_NAME}
      NEW_CHAT_DISCLAIMER: ${OPENWEBUI_DISCLAIMER}
      ENABLE_OLLAMA_API: 'false'
      OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      ENABLE_REALTIME_CHAT_SAVE: 'true'
      ENABLE_FOLLOW_UP_GENERATION: 'false'
      ENABLE_CODE_EXECUTION: 'false'
      ENABLE_CODE_INTERPRETER: 'false'
      ENABLE_AUTOCOMPLETE_GENERATION: 'false'
      ENABLE_EVALUATION_ARENA_MODELS: 'false'
      ENABLE_COMMUNITY_SHARING: 'false'
      ENABLE_TAGS_GENERATION: 'false'
      ENABLE_IMAGE_GENERATION: 'false'
      ENABLE_IMAGE_PROMPT_GENERATION: 'false'
      ENABLE_DIRECT_CONNECTIONS: 'true'
      USER_PERMISSIONS_CHAT_CONTROLS: 'false'
      USER_PERMISSIONS_CHAT_SYSTEM_PROMPT: 'false'
      USER_PERMISSIONS_CHAT_PARAMS: 'false'
      USER_PERMISSIONS_CHAT_STT: 'false'
      USER_PERMISSIONS_CHAT_TTS: 'false'
      USER_PERMISSIONS_CHAT_CALL: 'false'
      USER_PERMISSIONS_CHAT_MULTIPLE_MODELS: 'false'
      USER_PERMISSIONS_CHAT_TEMPORARY: 'false'
      USER_PERMISSIONS_FEATURES_DIRECT_TOOL_SERVERS: 'false'
      USER_PERMISSIONS_FEATURES_WEB_SEARCH: 'false'
      USER_PERMISSIONS_FEATURES_IMAGE_GENERATION: 'false'
      USER_PERMISSIONS_FEATURES_CODE_INTERPRETER: 'false'
      USER_PERMISSIONS_FEATURES_NOTES: 'true'
      USER_PERMISSIONS_WORKSPACE_MODELS_ACCESS: 'false'
      USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS: 'false'
      USER_PERMISSIONS_WORKSPACE_PROMPTS_ACCESS: 'false'
      USER_PERMISSIONS_WORKSPACE_TOOLS_ACCESS: 'false'
      USER_PERMISSIONS_WORKSPACE_MODELS_ALLOW_PUBLIC_SHARING: 'false'
      USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ALLOW_PUBLIC_SHARING: 'false'
      USER_PERMISSIONS_WORKSPACE_PROMPTS_ALLOW_PUBLIC_SHARING: 'false'
      USER_PERMISSIONS_WORKSPACE_TOOLS_ALLOW_PUBLIC_SHARING: 'false'

      RAG_EMBEDDING_ENGINE: 'openai'
      RAG_EMBEDDING_MODEL: 'text-embedding-3-small'
      ENABLE_RAG_HYBRID_SEARCH: 'true'
      RAG_TOP_K: '40'
      RAG_TOP_K_RERANKER: '20'
      RAG_RELEVANCE_THRESHOLD: '0.2'
      RAG_HYBRID_BM25_WEIGHT: '0.5'
      RAG_TEXT_SPLITTER: 'character'
      CHUNK_SIZE: '200'
      CHUNK_OVERLAP: '50'
      PDF_EXTRACT_IMAGES: 'false'
      RAG_FILE_MAX_SIZE: '100'
      RAG_FILE_MAX_COUNT: '10'
      RAG_EMBEDDING_BATCH_SIZE: '4'
      ENABLE_RETRIEVAL_QUERY_GENERATION: 'true'
      BYPASS_EMBEDDING_AND_RETRIEVAL: 'false'
      ENABLE_RAG_LOCAL_WEB_FETCH: 'false'
      RAG_FULL_CONTEXT: 'false'
      RAG_OPENAI_API_BASE_URL: ${RAG_OPENAI_API_BASE_URL}
      JWT_EXPIRES_IN: '1w'
      DEFAULT_USER_ROLE: 'user'
      ENABLE_OAUTH_SIGNUP: 'false'
      ENABLE_LOGIN_FORM: 'true'
      ENABLE_SIGNUP: 'true'
    networks:
      - app_network
    depends_on:
      - nginx-lb
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s 
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.external-url=${PROMETHEUS_EXTERNAL_URL}
      - --web.route-prefix=/
    networks:
      - app_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /etc:/host/etc:ro
      - /var/lib:/var/lib:ro
    networks:
      - app_network

  # dcgm-exporter GPU monitoring (uncomment if GPU available)
  # dcgm-exporter:
  #   image: nvidia/dcgm-exporter:2.5.7-2.10.1-ubuntu20.04
  #   container_name: dcgm-exporter
  #   restart: unless-stopped
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - NVIDIA_DRIVER_CAPABILITIES=compute,utility
  #   networks:
  #     - app_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - --docker_only=true
      - --store_container_labels=true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - postgres
    networks:
      - app_network

  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    restart: unless-stopped
    ports:
      - "${NGINX_LB_PORT}:8080"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - test-server-1
      - test-server-2
    networks:
      - app_network

  test-server-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-server-1
    restart: unless-stopped
    environment:
      PORT: '8000'
      SERVER_ID: 'server-1'
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  test-server-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-server-2
    restart: unless-stopped
    environment:
      PORT: '8000'
      SERVER_ID: 'server-2'
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
