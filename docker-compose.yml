version: '3.8'

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - ./data:/app/backend/data
    environment:
      # --- SSL and network settings ---
      ENABLE_WEB_LOADER_SSL_VERIFICATION: 'false'
      AIOHTTP_CLIENT_SESSION_TOOL_SERVER_SSL: 'false'
      AIOHTTP_CLIENT_SESSION_SSL: 'false'
      AIOHTTP_CLIENT_TIMEOUT_MODEL_LIST: '180'
      AIOHTTP_CLIENT_TIMEOUT: '3600'

      # --- General settings ---
      DEFAULT_MODELS: 'general_assistant'
      ENV: 'dev'
      OFFLINE_MODE: 'true'
      SAFE_MODE: 'false'
      UVICORN_WORKERS: '1'
      DEFAULT_LOCALE: 'ru-RU'
      ENABLE_WEBSOCKET_SUPPORT: 'true'
      REDIS_ENABLED: 'false'
      ENABLE_USER_WEBHOOKS: 'false'

      # --- UI customization ---
      WEBUI_NAME: 'Локальный Ассистент'
      NEW_CHAT_DISCLAIMER: 'Это тестовый режим для обучения'

      # --- LLM API (Подключаем наш Nginx-балансировщик с vLLM) ---
      ENABLE_OLLAMA_API: 'false'
      OPENAI_API_BASE_URLS: 'http://nginx:80/v1'
      OPENAI_API_KEY: 'sk-dummy-key' # Заглушка для vLLM

      # --- Feature toggles ---
      ENABLE_REALTIME_CHAT_SAVE: 'true'
      ENABLE_FOLLOW_UP_GENERATION: 'false'
      ENABLE_CODE_EXECUTION: 'false'
      ENABLE_CODE_INTERPRETER: 'false'
      ENABLE_AUTOCOMPLETE_GENERATION: 'false'
      ENABLE_EVALUATION_ARENA_MODELS: 'false'
      ENABLE_COMMUNITY_SHARING: 'false'
      ENABLE_TAGS_GENERATION: 'false'
      ENABLE_IMAGE_GENERATION: 'false'
      ENABLE_IMAGE_PROMPT_GENERATION: 'false'
      ENABLE_DIRECT_CONNECTIONS: 'true'

      # --- User permissions - Chat ---
      USER_PERMISSIONS_CHAT_CONTROLS: 'false'
      USER_PERMISSIONS_CHAT_SYSTEM_PROMPT: 'false'
      USER_PERMISSIONS_CHAT_PARAMS: 'false'
      USER_PERMISSIONS_CHAT_STT: 'false'
      USER_PERMISSIONS_CHAT_TTS: 'false'
      USER_PERMISSIONS_CHAT_CALL: 'false'
      USER_PERMISSIONS_CHAT_MULTIPLE_MODELS: 'false'
      USER_PERMISSIONS_CHAT_TEMPORARY: 'false'

      # --- User permissions - Features ---
      USER_PERMISSIONS_FEATURES_DIRECT_TOOL_SERVERS: 'false'
      USER_PERMISSIONS_FEATURES_WEB_SEARCH: 'false'
      USER_PERMISSIONS_FEATURES_IMAGE_GENERATION: 'false'
      USER_PERMISSIONS_FEATURES_CODE_INTERPRETER: 'false'
      USER_PERMISSIONS_FEATURES_NOTES: 'true'

      # --- User permissions - Workspace ---
      USER_PERMISSIONS_WORKSPACE_MODELS_ACCESS: 'false'
      USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS: 'false'
      USER_PERMISSIONS_WORKSPACE_PROMPTS_ACCESS: 'false'
      USER_PERMISSIONS_WORKSPACE_TOOLS_ACCESS: 'false'
      USER_PERMISSIONS_WORKSPACE_MODELS_ALLOW_PUBLIC_SHARING: 'false'
      USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ALLOW_PUBLIC_SHARING: 'false'
      USER_PERMISSIONS_WORKSPACE_PROMPTS_ALLOW_PUBLIC_SHARING: 'false'
      USER_PERMISSIONS_WORKSPACE_TOOLS_ALLOW_PUBLIC_SHARING: 'false'

      # --- RAG settings (Локальные эмбеддинги внутри Open WebUI) ---
      RAG_EMBEDDING_ENGINE: 'sentence-transformers'
      RAG_EMBEDDING_MODEL: 'sentence-transformers/all-MiniLM-L6-v2'
      ENABLE_RAG_HYBRID_SEARCH: 'true'
      RAG_TOP_K: '40'
      RAG_TOP_K_RERANKER: '20'
      RAG_RELEVANCE_THRESHOLD: '0.2'
      RAG_HYBRID_BM25_WEIGHT: '0.5'
      RAG_TEXT_SPLITTER: 'character'
      CHUNK_SIZE: '200'
      CHUNK_OVERLAP: '50'
      PDF_EXTRACT_IMAGES: 'false'
      RAG_FILE_MAX_SIZE: '100'
      RAG_FILE_MAX_COUNT: '10'
      RAG_EMBEDDING_BATCH_SIZE: '4'
      ENABLE_RETRIEVAL_QUERY_GENERATION: 'true'
      BYPASS_EMBEDDING_AND_RETRIEVAL: 'false'
      ENABLE_RAG_LOCAL_WEB_FETCH: 'false'
      RAG_FULL_CONTEXT: 'false'
      
      # --- Authentication ---
      JWT_EXPIRES_IN: '1w'
      DEFAULT_USER_ROLE: 'user'
      ENABLE_OAUTH_SIGNUP: 'false'
      ENABLE_LOGIN_FORM: 'true'
      ENABLE_SIGNUP: 'true'
    networks:
      - app_network
    depends_on:
      - nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vllm-local-1
      - vllm-local-2
    networks:
      - app_network

  vllm-local-1:
    image: vllm/vllm-openai:latest
    container_name: vllm-local-1
    restart: unless-stopped
    volumes:
      - /home/bsuir/bsuir-llm/models/gpt-oss-20b:/model
    command: --model /model --max-model-len 8192 --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    networks:
      - app_network

  vllm-local-2:
    image: vllm/vllm-openai:latest
    container_name: vllm-local-2
    restart: unless-stopped
    volumes:
      - /home/bsuir/bsuir-llm/models/gpt-oss-20b:/model
    command: --model /model --max-model-len 8192 --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    networks:
      - app_network

networks:
  app_network:
    driver: bridge